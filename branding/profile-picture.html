<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <title>Drömleendet — IG profile picture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body { margin: 0; }
      #avatar {
        width: 1080px;
        height: 1080px;
        background: #0d9488;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      .D {
        font-weight: 800;
        color: #ffffff;
        font-size: 720px;
        line-height: 1;
        letter-spacing: -0.05em;
        margin-bottom: 30px;
      }
      .subtle {
        position: absolute;
        bottom: 110px;
        font-size: 56px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.6);
        text-transform: lowercase;
      }
    </style>
  </head>
  <body>
    <div id="avatar">
      <span class="D">D</span>
    </div>
  </body>
</html>
